services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: ${THORNHILL_POSTGRES_IMAGE:-thornhill-postgres}
    # Validate before the official entrypoint can initialize a persistent volume.
    # Compose itself only enforces non-empty interpolation, so this protects the
    # direct `docker compose up` path as well as the controlled deployer.
    entrypoint:
      - /bin/sh
      - -ec
      - |
        case "$${POSTGRES_PASSWORD}" in
          ''|*[!0-9a-f]*) echo 'POSTGRES_PASSWORD must be 64 lowercase hexadecimal characters' >&2; exit 64 ;;
        esac
        [ "$${#POSTGRES_PASSWORD}" -eq 64 ] || {
          echo 'POSTGRES_PASSWORD must be 64 lowercase hexadecimal characters' >&2
          exit 64
        }
        exec /usr/local/bin/docker-entrypoint.sh "$$@"
      - --
    command: ["postgres"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: thornhill
      POSTGRES_PASSWORD: ${THORNHILL_DB_PASSWORD:?set a 64-character lowercase hex THORNHILL_DB_PASSWORD in .env}
      POSTGRES_DB: thornhill
    volumes:
      # PostgreSQL 18+ stores versioned clusters below /var/lib/postgresql.
      # Mount the parent so pg_upgrade --link can cross major versions safely.
      - dbdata:/var/lib/postgresql
    # The official entrypoint execs postgres as PID 1 after initialization. Do
    # not insert a root-owned tini: with all capabilities dropped it cannot
    # forward signals to the UID-70 server without adding CAP_KILL.
    init: false
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    pids_limit: 256
    tmpfs:
      - /run/postgresql:rw,noexec,nosuid,size=16m,uid=70,gid=70,mode=2775
      - /tmp:rw,noexec,nosuid,size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    # PostgreSQL treats SIGTERM as a smart shutdown and waits for the old app's
    # connection during Compose replacement. SIGINT is its fast, clean shutdown:
    # terminate clients, checkpoint, and exit within the bounded grace period.
    stop_signal: SIGINT
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thornhill"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      args:
        THORNHILL_REVISION: ${THORNHILL_REVISION:-unknown}
    image: ${THORNHILL_APP_IMAGE:-thornhill-app}
    env_file: ${THORNHILL_ENV_FILE:-.env}
    environment:
      THORNHILL_DB_PASSWORD: ${THORNHILL_DB_PASSWORD:?set a 64-character lowercase hex THORNHILL_DB_PASSWORD in .env}
      DATABASE_URL: postgres://thornhill:${THORNHILL_DB_PASSWORD:?set a 64-character lowercase hex THORNHILL_DB_PASSWORD in .env}@db:5432/thornhill?sslmode=disable
    ports:
      # Safe by default: local-only. Set THORNHILL_BIND_ADDR to the host's
      # Tailscale address for an intentional tailnet-only deployment.
      - "${THORNHILL_BIND_ADDR:-127.0.0.1}:8787:8787"
    volumes:
      - prebaked:/data
    init: true
    read_only: true
    cap_drop:
      - ALL
    pids_limit: 256
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  dbdata:
  prebaked:
